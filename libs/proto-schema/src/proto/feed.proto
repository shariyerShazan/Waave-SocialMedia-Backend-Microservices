// proto/feed.proto
syntax = "proto3";

package feed;

service FeedService {
  rpc GetFeed          (GetFeedRequest)    returns (FeedResponse);
  rpc GetExploreFeed   (ExploreRequest)    returns (FeedResponse);
  rpc GetTrendingPosts (TrendingRequest)   returns (FeedResponse);
  rpc InvalidateFeed   (InvalidateRequest) returns (InvalidateResponse);
}

message GetFeedRequest {
  string userId  = 1;
  int32  page    = 2;
  int32  limit   = 3;
  string cursor  = 4;  
}

message ExploreRequest {
  string userId = 1;
  int32  page   = 2;
  int32  limit  = 3;
}

message TrendingRequest {
  int32 limit = 1;
}

message InvalidateRequest {
  string userId = 1;
}

message InvalidateResponse {
  bool success = 1;
}

message Media {
  string id       = 1;
  string url      = 2;
  string mimeType = 3;
  string type     = 4;
}

message User {
  string id       = 1;
  string username = 2;
  string fullName = 3;
  string avatar   = 4;
  bool   verified = 5;
}

message FeedPost {
  string          id            = 1;
  string          content       = 2;
  string          feeling       = 3;
  string          location      = 4;
  int32           likesCount    = 5;
  int32           commentsCount = 6;
  int32           sharesCount   = 7;
  int32           viewsCount    = 8;
  bool            isLiked       = 9;
  bool            isBookmarked  = 10;
  string          createdAt     = 11;
  User            author        = 12;
  repeated Media  media         = 13;
}

message FeedResponse {
  bool             success    = 1;
  repeated FeedPost posts     = 2;
  int32            total      = 3;
  string           nextCursor = 4;
  bool             hasMore    = 5;
}