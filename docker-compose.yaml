        'mongod',
        '--replSet',
        'media-rs',
        '--bind_ip_all',
        '--keyFile',
        '/data/keyfile/mongo-keyfile',
      ]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo123
    volumes:
      - media_mongo_db_1_data:/data/db
      - ./mongo-init/mongo-keyfile:/data/keyfile/mongo-keyfile:ro
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '-u',
          'mongo',
          '-p',
          'mongo123',
          '--authenticationDatabase',
          'admin',
          '--eval',
          "db.adminCommand('ping')",
        ]
