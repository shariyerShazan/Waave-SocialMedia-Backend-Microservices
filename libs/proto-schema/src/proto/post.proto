syntax = "proto3";

package post;

service PostService {
  // Post CRUD
  rpc CreatePost    (CreatePostRequest)   returns (PostResponse);
  rpc GetPost       (GetPostRequest)      returns (PostResponse);
  rpc UpdatePost    (UpdatePostRequest)   returns (PostResponse);
  rpc DeletePost    (DeletePostRequest)   returns (DeleteResponse);
  rpc GetUserPosts  (GetUserPostsRequest) returns (PostsListResponse);

  // Reactions
  rpc LikePost      (ReactionRequest)    returns (ReactionResponse);
  rpc UnlikePost    (ReactionRequest)    returns (ReactionResponse);
  rpc ReactToPost   (ReactRequest)       returns (ReactionResponse);

  // Comments
  rpc AddComment    (AddCommentRequest)   returns (CommentResponse);
  rpc GetComments   (GetCommentsRequest)  returns (CommentsListResponse);
  rpc DeleteComment (DeleteCommentRequest)returns (DeleteResponse);
  rpc LikeComment   (ReactionRequest)    returns (ReactionResponse);

  // Share & Bookmark
  rpc SharePost     (ShareRequest)       returns (ShareResponse);
  rpc BookmarkPost  (ReactionRequest)    returns (ReactionResponse);

  // Internal
  rpc GetPostsByIds (GetPostsByIdsRequest)returns (PostsListResponse);
  rpc IncrViewCount (ViewCountRequest)   returns (ViewCountResponse);
}

// ── Post Messages ─────────────────────────────────
message CreatePostRequest {
  string        userId     = 1;
  optional string        content    = 2;
  repeated string mediaIds = 3;
  optional string        feeling    = 4;
  optional string        location   = 5;
  PostPrivacy   privacy    = 6;
  optional string        taggedUsers= 7;
}

message GetPostRequest {
  string postId      = 1;
  string requesterId = 2;
}

message UpdatePostRequest {
  string      postId  = 1;
  string      userId  = 2;
  string      content = 3;
  PostPrivacy privacy = 4;
}

message DeletePostRequest {
  string postId = 1;
  string userId = 2;
}

message GetUserPostsRequest {
  string userId      = 1;
  string requesterId = 2;
  int32  page        = 3;
  int32  limit       = 4;
}

message DeleteResponse {
  bool   success = 1;
  string message = 2;
}

// ── Reaction Messages ─────────────────────────────
message ReactionRequest {
  string postId = 1;
  string userId = 2;
}

message ReactRequest {
  string       postId       = 1;
  string       userId       = 2;
  ReactionType reactionType = 3;
}

message ReactionResponse {
  bool   success       = 1;
  string message       = 2;
  int32  likesCount    = 3;
  bool   isLiked       = 4;
  string reactionType  = 5;
}

// ── Comment Messages ──────────────────────────────
message AddCommentRequest {
  string postId   = 1;
  string userId   = 2;
  string text     = 3;
  string parentId = 4; 
}

message GetCommentsRequest {
  string postId   = 1;
  string parentId = 2;
  int32  page     = 3;
  int32  limit    = 4;
}

message DeleteCommentRequest {
  string commentId = 1;
  string userId    = 2;
}

message Comment {
  string   id            = 1;
  string   postId        = 2;
  string   userId        = 3;
  string   text          = 4;
  string   parentId      = 5;
  int32    likesCount    = 6;
  int32    repliesCount  = 7;
  bool     isLiked       = 8;
  string   createdAt     = 9;
  PostAuthor author      = 10;
}

message CommentResponse {
  bool    success = 1;
  string  message = 2;
  Comment comment = 3;
}

message CommentsListResponse {
  bool             success  = 1;
  repeated Comment comments = 2;
  int32            total    = 3;
  int32            page     = 4;
}

// ── Share & Bookmark ──────────────────────────────
message ShareRequest {
  string postId  = 1;
  string userId  = 2;
  string comment = 3;
}

message ShareResponse {
  bool   success     = 1;
  string message     = 2;
  int32  sharesCount = 3;
}

// ── View Count ────────────────────────────────────
message ViewCountRequest {
  string postId = 1;
  string userId = 2;
}

message ViewCountResponse {
  int32 viewsCount = 1;
}

// ── Internal ──────────────────────────────────────
message GetPostsByIdsRequest {
  repeated string postIds    = 1;
  string          requesterId= 2;
}

// ── Post Object ───────────────────────────────────
message Post {
  string          id            = 1;
  string          userId        = 2;
  string          content       = 3;
  string          feeling       = 4;
  string          location      = 5;
  string          privacy       = 6;
  int32           likesCount    = 7;
  int32           commentsCount = 8;
  int32           sharesCount   = 9;
  int32           viewsCount    = 10;
  bool            isLiked       = 11;
  bool            isBookmarked  = 12;
  string          reactionType  = 13;
  string          createdAt     = 14;
  string          updatedAt     = 15;
  repeated PostMedia media      = 16;
  PostAuthor        author     = 17;
}

message PostResponse {
  bool   success = 1;
  string message = 2;
  Post   post    = 3;
}

message PostsListResponse {
  bool          success = 1;
  repeated Post posts   = 2;
  int32         total   = 3;
  int32         page    = 4;
}

// ── Enums ─────────────────────────────────────────
enum PostPrivacy {
  PUBLIC   = 0;
  FRIENDS  = 1;
  PRIVATE  = 2;
}

enum ReactionType {
  LIKE  = 0;
  LOVE  = 1;
  HAHA  = 2;
  WOW   = 3;
  SAD   = 4;
  ANGRY = 5;
}

message PostMedia {
  string id = 1;
  string url = 2;
  string mimeType = 3;
  string type = 4;
}

message PostAuthor {
  string id = 1;
  string username = 2;
  string fullName = 3;
  string avatar = 4;
  bool verified = 5;
}