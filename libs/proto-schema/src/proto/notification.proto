syntax = "proto3";

package notification;

service NotificationGrpcService {
  rpc GetNotifications (GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc GetNotificationById (GetNotificationByIdRequest) returns (NotificationModel);
  rpc MarkAsRead (MarkAsReadRequest) returns (ActionResponse);
  rpc MarkAllAsRead (MarkAllAsReadRequest) returns (ActionResponse);
}

message GetNotificationsRequest {
  string userId = 1;
  int32 page = 2;
  int32 limit = 3;
}

message NotificationModel {
  string id = 1;
  string toUserId = 2;
  string fromUserId = 3;
  string fromUserName = 4;
  string fromUserAvatar = 5;
  string type = 6;
  string title = 7;
  string body = 8;
  bool isRead = 9;
  string createdAt = 10;
  NotificationData data = 11;
}

message NotificationData {
  string postId = 1;
  string commentId = 2;
  string groupId = 3;
}

message GetNotificationsResponse {
  repeated NotificationModel notifications = 1;
  int32 total = 2;
  int32 unreadCount = 3;
  int32 page = 4;
}

message GetNotificationByIdRequest {
  string userId = 1;
  string notificationId = 2;
}

message MarkAsReadRequest {
  string userId = 1;
  string notificationId = 2;
}

message MarkAllAsReadRequest {
  string userId = 1;
}

message ActionResponse {
  bool success = 1;
}