services:
  # ── Databases Postgres ──────────────────────────────────
  # auth postgres
  auth-postgres-primary:
    image: postgres:17
    container_name: waave_postgres_auth_primary
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: auth_db
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
    volumes:
      - auth-postgres-primary_data:/var/lib/postgresql/data
      - ./pg-init/primary-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-postgres-replica:
    image: postgres:17
    container_name: waave_postgres_auth_replica
    ports:
      - '5442:5432'
    environment:
      PGPASSWORD: replicator_pass
    volumes:
      - auth-postgres-replica_data:/var/lib/postgresql/data
    depends_on:
      auth-postgres-primary:
        condition: service_healthy
    entrypoint: >
      bash -c "
      set -e;
      if [ -z \"$$(ls -A /var/lib/postgresql/data 2>/dev/null)\" ]; then
        echo 'No data found, cloning from primary...';
        pg_basebackup -h auth-postgres-primary -p 5432 -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R;
        chmod 0700 /var/lib/postgresql/data;
      fi;
      exec docker-entrypoint.sh postgres
      "
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # user postgres
