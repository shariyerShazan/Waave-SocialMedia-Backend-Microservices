syntax = "proto3";

package notification;

service NotificationGrpcService {
  rpc GetNotifications(GetNotificationsRequest)
      returns (GetNotificationsResponse);

  rpc MarkAsRead(MarkAsReadRequest)
      returns (ActionResponse);

  rpc MarkAllAsRead(MarkAllAsReadRequest)
      returns (ActionResponse);

  rpc DeleteNotification(DeleteNotificationRequest)
      returns (ActionResponse);

  rpc GetPreferences(GetPreferencesRequest)
      returns (NotificationPreference);

  rpc UpdatePreferences(UpdatePreferencesRequest)
      returns (NotificationPreference);
}

message User {
  string id       = 1;
  string username = 2;
  string fullName = 3;
  string avatar   = 4;
  bool   verified = 5;
}

message Notification {
  string id               = 1;
  string toUserId         = 2;
  User   sender           = 3;
  string type             = 4;
  string title            = 5;
  string body             = 6;
  string createdAt        = 7;
  bool   isRead           = 8;
  map<string,string> data = 9;
}

message GetNotificationsRequest {
  string userId = 1;
  int32 page = 2;
  int32 limit = 3;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
  int32 unreadCount = 3;
  int32 page = 4;
}

message MarkAsReadRequest {
  string userId = 1;
  string notificationId = 2;
}

message MarkAllAsReadRequest {
  string userId = 1;
}

message DeleteNotificationRequest {
  string userId = 1;
  string notificationId = 2;
}

message GetPreferencesRequest {
  string userId = 1;
}

message UpdatePreferencesRequest {
  string userId = 1;

  bool likes = 2;
  bool comments = 3;
  bool follows = 4;
  bool unfollows = 5;
  bool mentions = 6;
  bool messages = 7;
}

message NotificationPreference {
  string userId = 1;

  bool likes = 2;
  bool comments = 3;
  bool follows = 4;
  bool unfollows = 5;
  bool mentions = 6;
  bool messages = 7;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}