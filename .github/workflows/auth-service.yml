name: Auth Service CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/auth-service/**'
      - 'libs/common/**'
      - 'libs/prisma/**'
      - 'libs/kafka/**'
      - 'libs/proto-schema/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/auth-service/**'
      - 'libs/common/**'
      - 'libs/prisma/**'
      - 'libs/kafka/**'
      - 'libs/proto-schema/**'

jobs:
  auth-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Auth Prisma Client
        run: npm run auth:prisma:generate

      - name: Lint Auth Service
        run: npm run lint

      - name: Build Auth Service
        run: npx nest build auth-service